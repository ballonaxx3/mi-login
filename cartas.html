<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartas 💌</title>

<style>
:root {
  --bg: #0f0a1f;
  --card: #1c1235;
  --primary: #a855f7;
  --secondary: #c084fc;
  --text: #f5f3ff;
  --nav: rgba(28,18,53,0.8);
  --hover: #9333ea;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-top: 80px;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: var(--nav);
  backdrop-filter: blur(10px);
  padding: 15px;
  display: flex;
  justify-content: center;
  gap: 15px;
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  padding: 10px 18px;
  background: var(--primary);
  border-radius: 10px;
  transition: 0.3s;
}

nav a:hover {
  background: var(--hover);
}

/* TITULO */
h1 {
  text-align: center;
  margin: 20px;
  color: var(--secondary);
}

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD COMO LINK */
.card {
  display: block;
  background: var(--card);
  border-radius: 15px;
  padding: 20px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px var(--primary);
}

.card h3 {
  margin-bottom: 10px;
  color: var(--secondary);
}

.card p {
  color: #ddd;
  font-size: 14px;
}
</style>
</head>

<body>
<link rel="stylesheet" href="responsivo.css">
<nav>
  <a href="dashboard.html">Inicio 🏠</a>
  <a href="fotos.html">Fotos 🌸</a>
  <a href="cartas.html">Cartas 💌</a>
</nav>

<h1>💌 Cartas para ti</h1>

<div class="galeria">

  <a href="carta1.html" class="card">
    <h3>Carta 1 💌</h3>
    <p>Una pequeña parte de lo que siento...</p>
  </a>

  <a href="carta2.html" class="card">
    <h3>Carta 2 💌</h3>
    <p>Algo que quiero decirte...</p>
  </a>

  <a href="carta3.html" class="card">
    <h3>Carta 3 💌</h3>
    <p>Un mensaje especial...</p>
  </a>

</div>

</body>
</html>
