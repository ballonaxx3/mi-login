<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error de Acceso</title>
    <style>
                :root {
            --color-primario: #C17BC1;
            --color-secundario: #E4C5E4;
            --color-acento: #9C3C9F;

            --color-fondo: #121212;
            --color-card: #1e1e1e;
            --color-texto: #ffffff;

            --color-error: #ff4d4d;
            --color-boton: #9C3C9F;
            --color-boton-hover: #7e1c87;
        }

        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, var(--color-primario), var(--color-secundario));
            margin: 0;
            color: var(--color-texto);
        }

        .card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--color-error);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            color: var(--color-error);
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 15px;
        }

        a {
            text-decoration: none;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: var(--color-boton);
            color: white;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--color-boton-hover);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>❌ Acceso Denegado</h1>
        <p>El usuario o la contraseña no son válidos.</p>
        <a href="/login" class="btn">Intentar de nuevo</a>
    </div>
</body>
</html>
