<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error de Acceso</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 12px; text-align: center; border: 1px solid #ff4d4d; }
        h1 { color: #ff4d4d; }
        a { color: #6366f1; text-decoration: none; font-weight: bold; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #6366f1; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>❌ Acceso Denegado</h1>
        <p>El usuario o la contraseña no son válidos.</p>
        <a href="/login" class="btn">Intentar de nuevo</a>
    </div>
</body>
</html>
