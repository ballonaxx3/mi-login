<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta 2 💌</title>

<style>
:root {
  --bg: linear-gradient(135deg, #0f0a1f, #1c1235);
  --card: rgba(28,18,53,0.9);
  --primary: #a855f7;
  --secondary: #c084fc;
  --text: #f5f3ff;
  --hover: #9333ea;
}

body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

.carta {
  background: var(--card);
  padding: 40px;
  border-radius: 20px;
  max-width: 700px;
  box-shadow: 0 0 30px var(--primary);
  position: relative;
  overflow: hidden;
}

h1 {
  color: var(--secondary);
  text-align: center;
  margin-bottom: 20px;
}

.texto {
  font-size: 18px;
  line-height: 1.8;
  white-space: pre-wrap;
  min-height: 200px;
}

.cursor {
  display: inline-block;
  width: 2px;
  background: var(--primary);
  animation: parpadeo 0.8s infinite;
  vertical-align: bottom;
}

@keyframes parpadeo {
  50% { opacity: 0; }
}

a {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 25px;
  background: var(--primary);
  border-radius: 12px;
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

a:hover {
  background: var(--hover);
}
</style>
</head>
<link rel="stylesheet" href="responsivo.css">
<body>

<div class="carta">
  <h1>💌 Carta 2</h1>
  <p class="texto" id="texto"></p>
  <span class="cursor" id="cursor"></span>
  <a href="cartas.html">← Volver</a>
</div>

<audio id="musica" src="romantica.mp3" autoplay loop></audio>

<script>
const mensaje = `Mi amor 💖,

Gracias por cada sonrisa, cada abrazo y cada palabra que compartimos. 
Contigo aprendí que el verdadero amor se siente en las cosas pequeñas y sinceras.

Eres mi compañía favorita y mi alegría diaria.

Siempre tuyo ✨`;

const textoElem = document.getElementById("texto");
const cursor = document.getElementById("cursor");
let index = 0;

function escribirLetra() {
  if(index < mensaje.length) {
    textoElem.textContent += mensaje.charAt(index);
    index++;
    setTimeout(escribirLetra, 60); // velocidad de escritura
  } else {
    cursor.style.display = "none"; // desaparece al terminar
  }
}

window.onload = () => {
  escribirLetra();
  const audio = document.getElementById("musica");
  audio.volume = 0.3;
};
</script>

</body>
</html>
