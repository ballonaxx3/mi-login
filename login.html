<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inicio 💜</title>

<!-- CSS -->
<style>
:root {
    --bg: #0f0a1f;
    --card: #1c1235;
    --primary: #a855f7;
    --secondary: #c084fc;
    --text: #f5f3ff;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
}

form {
    background: var(--card);
    padding: 40px;
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 20px rgba(168,85,247,0.3);
    display: flex;
    flex-direction: column;
    gap: 20px;
}

h2 {
    text-align: center;
    color: var(--primary);
    margin-bottom: 20px;
}

input {
    padding: 12px 16px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 16px;
}

input[type="text"], input[type="password"] {
    background: #2a1e3f;
    color: var(--text);
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--primary);
    color: var(--text);
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: var(--secondary);
}

/* Contenedor del input con icono */
.password-container {
    position: relative;
    display: flex;
    align-items: center;
}

.password-container input {
    width: 100%;
    padding-right: 40px; /* espacio para el ojo */
}

.password-container .toggle-eye {
    position: absolute;
    right: 12px;
    cursor: pointer;
    font-size: 18px;
    color: var(--secondary);
}
</style>

</head>
<body>

<form action="/login" method="POST">
    <h2>Iniciar Sesión 💜</h2>
    <input type="text" name="usuario" placeholder="Usuario" required>

    <div class="password-container">
        <input type="password" name="password" id="password" placeholder="Contraseña" required>
        <span class="toggle-eye" id="toggle-eye">👁️</span>
    </div>

    <button type="submit">Entrar</button>
</form>

<!-- JavaScript para mostrar/ocultar contraseña -->
<script>
const passwordInput = document.getElementById('password');
const toggleEye = document.getElementById('toggle-eye');

toggleEye.addEventListener('click', () => {
    if(passwordInput.type === 'password'){
        passwordInput.type = 'text';
        toggleEye.textContent = '🙈'; // cambia el icono
    } else {
        passwordInput.type = 'password';
        toggleEye.textContent = '👁️';
    }
});
</script>

</body>
</html>
