<!DOCTYPE html>
<html lang="es">
<head>
    <title>Login Seguro</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #121212; color: white; }
        form { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #6366f1; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <form action="/login" method="POST">
        <h2>Iniciar Sesión</h2>
        <input type="text" name="usuario" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Entrar</button>
    </form>
</body>
</html>
