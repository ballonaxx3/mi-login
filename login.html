<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* PALETA */
:root {
    --primario: #C17BC1;
    --secundario: #E4C5E4;
    --acento: #9C3C9F;
    --fondo: #F9F7FB;
    --texto: #1A1A1A;
}

/* BODY */
body {
    font-family: sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, var(--primario), var(--secundario));
}

/* FORM */
form {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 15px;
    width: 100%;
    max-width: 350px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}

/* ANIMACION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* TITULO */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUTS */
input {
    width: 100%;
    margin-bottom: 15px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.25);
    color: white;
    font-size: 14px;
}

/* PLACEHOLDER */
input::placeholder {
    color: rgba(255,255,255,0.7);
}

/* FOCUS */
input:focus {
    box-shadow: 0 0 5px rgba(255,255,255,0.5);
}

/* BOTON */
button {
    width: 100%;
    padding: 12px;
    background: var(--acento);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

/* HOVER */
button:hover {
    background: #7e1c87;
    transform: scale(1.03);
}

/* RESPONSIVE */
@media (max-width: 480px) {
    form {
        padding: 25px;
        margin: 10px;
    }
}
</style>

</head>
<body>

<form action="/login" method="POST">
    <h2>Iniciar Sesión</h2>
    <input type="text" name="usuario" placeholder="Usuario" required>
    <input type="password" name="password" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
</form>

</body>
</html>
