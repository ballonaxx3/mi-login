<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Panel de Control</title>
    <style>
        /* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* PALETA */
:root {
    --color-primario: #C17BC1;
    --color-secundario: #E4C5E4;
    --color-acento: #9C3C9F;

    --color-fondo: #121212;
    --color-card: rgba(0, 0, 0, 0.45);

    --color-texto: #ffffff;
    --color-texto-suave: rgba(255,255,255,0.7);

    --color-borde: rgba(255,255,255,0.15);
}

/* BODY */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--color-primario), var(--color-secundario));
    color: var(--color-texto);
    min-height: 100vh;
    padding: 30px;
}

/* HEADER */
header {
    text-align: center;
    margin-bottom: 30px;
}

header p {
    color: var(--color-texto-suave);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: var(--color-card);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    text-decoration: none;
    color: white;
    border: 1px solid var(--color-borde);
    transition: 0.3s;
}

/* HOVER */
.card:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* ICONO */
.icon {
    font-size: 40px;
    margin-bottom: 10px;
}

/* TEXTOS */
.card h2 {
    margin-bottom: 5px;
}

.card p {
    color: var(--color-texto-suave);
    font-size: 14px;
}
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Bienvenido al Dashboard!</h1>
        <p>Has iniciado sesión con éxito en el sistema.</p>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <p>Aquí puedes agregar tus tablas, gráficos o datos privados.</p>
        
        <a href="/" class="btn-logout">Cerrar Sesión</a>
    </div>

</body>
</html>
