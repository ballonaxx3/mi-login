<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Panel de Control</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212; /* Fondo oscuro */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: #4CAF50; }
        p { color: #ccc; }
        .btn-logout {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #f44336;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-logout:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Bienvenido al Dashboard!</h1>
        <p>Has iniciado sesión con éxito en el sistema.</p>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <p>Aquí puedes agregar tus tablas, gráficos o datos privados.</p>
        
        <a href="/" class="btn-logout">Cerrar Sesión</a>
    </div>

</body>
</html>
