<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotos</title>

<style>
:root {
  --bg: #0f0a1f;
  --card: #1c1235;
  --primary: #a855f7;
  --secondary: #c084fc;
  --text: #f5f3ff;

  /* ✅ AGREGADOS */
  --nav: rgba(28,18,53,0.8);
  --hover: #9333ea;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);

  /* ✅ para que el nav no tape */
  padding-top: 80px;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: var(--nav);
  backdrop-filter: blur(10px);
  padding: 15px;
  display: flex;
  justify-content: center;
  gap: 15px;
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  padding: 10px 18px;
  background: var(--primary);
  border-radius: 10px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(168,85,247,0.6);
}

nav a:hover {
  background: var(--hover);
  transform: scale(1.05);
}

/* TITULO */
h1 {
  text-align: center;
  margin: 20px;
  color: var(--secondary);
}

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: var(--card);
  border-radius: 15px;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px var(--primary);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  cursor: pointer;
}

.card p {
  padding: 10px;
  text-align: center;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 50px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(15,10,31,0.95);
  text-align: center;
}

.modal-contenido {
  max-width: 85%;
  max-height: 75vh;
  border-radius: 15px;
  box-shadow: 0 0 25px #a855f7;
  animation: zoom 0.3s ease;
}

@keyframes zoom {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

#texto {
  margin-top: 15px;
  color: #c084fc;
  font-size: 18px;
}

.cerrar {
  position: absolute;
  top: 20px;
  right: 40px;
  color: white;
  font-size: 40px;
  cursor: pointer;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .card img {
    height: 150px;
  }
}
</style>
</head>
<link rel="stylesheet" href="responsivo.css">
<body>

<nav>
  <a href="dashboard.html">Inicio 🏠</a>
  <a href="fotos.html">Fotos 🌸</a>
  <a href="cartas.html">Carta 💌</a>
</nav>

<h1>📸 Fotos importantes para mí</h1>

<div class="galeria">
  
  <div class="card">
    <img src="f1.jpg">
    <p>TU</p>
  </div>

  <div class="card">
    <img src="f2.jpg">
    <p>Nuestro bb</p>
  </div>

  <div class="card">
    <img src="f3.jpg">
    <p>Nosotros</p>
  </div>

  <div class="card">
    <img src="f4.jpg">
    <p>Los 3 juntos</p>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="cerrar">&times;</span>
  <img class="modal-contenido" id="imgGrande">
  <p id="texto"></p>
</div>

<script>
const modal = document.getElementById("modal");
const imgGrande = document.getElementById("imgGrande");
const texto = document.getElementById("texto");
const cerrar = document.querySelector(".cerrar");

// abrir imagen
document.querySelectorAll(".card img").forEach(img => {
  img.addEventListener("click", () => {
    modal.style.display = "block";
    imgGrande.src = img.src;
    texto.textContent = img.nextElementSibling.textContent;
  });
});

// cerrar con X
cerrar.onclick = () => modal.style.display = "none";

// cerrar clic afuera
modal.onclick = (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
};

// cerrar con ESC
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    modal.style.display = "none";
  }
});
</script>

</body>
</html>
